<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9. 生物多樣性地圖 App</title>
    <!-- Leaflet 地圖 CSS -->
    <link rel="stylesheet" href="https://unpkg.com" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --primary-color: #2e7d32;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b0b0b0;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #1b3a24;
            padding: 12px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.3rem;
            color: #81c784;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 3px;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        /* 提示工具列 */
        .instruction-banner {
            background-color: #333;
            color: #fff;
            padding: 8px;
            text-align: center;
            font-size: 0.9rem;
            z-index: 999;
            border-bottom: 2px solid var(--primary-color);
        }

        /* 彈出視窗客製化樣式 */
        .leaflet-popup-content-wrapper {
            background-color: var(--card-bg);
            color: var(--text-main);
            border-radius: 12px;
            border: 1px solid #333;
        }

        .leaflet-popup-tip {
            background-color: var(--card-bg); /* 補齊中斷的程式碼 */
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>生物多樣性地圖</h1>
            <div class="subtitle">台灣生態觀測記錄</div>
        </div>
    </header>

    <div class="instruction-banner">
        點擊地圖上的標記，查看生物觀測詳細資訊
    </div>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <!-- Leaflet 地圖 JS -->
    <script src="https://unpkg.com" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 初始化地圖，設定中心點於 Chiayi, Taiwan (嘉義) 並設定縮放層級
        const map = L.map('map').setView([23.475, 120.447], 12);

        // 加入 OpenStreetMap 圖層
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 範例：新增一個生態觀測點標記 (以嘉義公園為例)
        const marker = L.marker([23.479, 120.457]).addTo(map);

        // 新增彈出視窗內容
        marker.bindPopup(`
            <div>
                <h3 style="margin: 0 0 5px 0; color: #81c784;">臺灣藍鵲</h3>
                <p style="margin: 0; font-size: 0.9rem;">地點：嘉義公園</p>
                <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: #b0b0b0;">紀錄時間：2026-07-07</p>
            </div>
        `);
    </script>
</body>
</html>
