<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9. 生物多樣性地圖 App</title>
    
    <style>
        :root {
            --primary-color: #2e7d32;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b0b0b0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #1b3a24;
            padding: 12px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.3rem;
            color: #81c784;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 3px;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        .instruction-banner {
            background-color: #333;
            color: #fff;
            padding: 8px;
            text-align: center;
            font-size: 0.9rem;
            z-index: 999;
            border-bottom: 2px solid var(--primary-color);
        }

        /* 資訊視窗內層包裹容器，防止樣式被 Google 內建結構破壞 */
        .custom-iw-wrapper {
            background-color: var(--card-bg);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            font-family: sans-serif;
        }

        /* 表單樣式 */
        .report-form {
            min-width: 220px;
        }

        .report-form h3 {
            margin: 0 0 10px 0;
            color: #81c784;
            font-size: 1.1rem;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 6px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        .submit-btn:hover {
            background-color: #1b5e20;
        }

        /* 顯示已上傳資料的樣式 */
        .view-popup {
            min-width: 200px;
        }
        .view-popup h3 {
            margin: 0 0 5px 0;
            color: #ffb74d;
            font-size: 1.1rem;
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            background: #333;
            color: #81c784;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .view-popup p {
            margin: 5px 0;
            font-size: 0.85rem;
            color: var(--text-sub);
        }
        .view-popup .meta {
            font-size: 0.75rem;
            color: #777;
            margin-top: 8px;
            border-top: 1px solid #333;
            padding-top: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>9. 生物多樣性地圖 App</h1>
            <div class="subtitle">台灣在地生態即時共享平台</div>
        </div>
    </header>

    <div class="instruction-banner">
        💡 點擊地圖上的任意地點，即可回報您發現的野生動植物！
    </div>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <script>
        let map;
        let currentInfoWindow = null;
        let AdvancedMarkerElement; 
        let PinElement;            
        
        // 模擬初始生態資料庫
        const speciesDatabase = [
            { id: 1, name: "台灣黑熊", type: "animal", description: "在步道附近發現爪痕與足跡", lat: 23.4700, lng: 120.9500, date: "2026-07-01" },
            { id: 2, name: "玉山針葉蘭", type: "plant", description: "向陽坡面群生，正值花期", lat: 23.4800, lng: 120.9600, date: "2026-07-05" }
        ];

        // 1. 初始化 Google 地圖（由底部腳本下載完成後觸發）
        async function initMap() {
            // 從全域 google 物件載入新版地圖與進階標記元件庫
            const { Map } = await google.maps.importLibrary("maps");
            const markerLib = await google.maps.importLibrary("marker");
            
            AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
            PinElement = markerLib.PinElement;

            // 以台灣中央為預設地圖視角中心
            const taiwanCenter = { lat: 23.7500, lng: 120.9500 };

            map = new Map(document.getElementById("map"), {
                zoom: 8,
                center: taiwanCenter,
                mapTypeId: 'terrain', // 設定為即時地形圖，最適合觀察生態棲地
                mapId: "DEMO_MAP_ID", // 啟用 AdvancedMarkerElement 所需的預設 ID
                mapTypeControl: true,
                streetViewControl: true,
                fullscreenControl: true
            });

            // 渲染初始資料
            loadExistingMarkers();

            // 監聽點擊地圖事件以新增觀測回報
            map.addListener("click", (mapsMouseEvent) => {
                handleMapClick(mapsMouseEvent.latLng);
            });
        }

        // 2. 循環渲染既有的生態標記
        function loadExistingMarkers() {
            speciesDatabase.forEach(species => {
                createSpeciesMarker(species);
            });
        }

        // 3. 建立帶有動態內嵌 Emoji 的進階大頭針標記
        function createSpeciesMarker(species) {
            const markerColor = species.type === 'animal' ? '#ff7043' : '#66bb6a';
            const glyphText = species.type === 'animal' ? '🐾' : '🌱';

            const pinBackground = new PinElement({
                background: markerColor,
                borderColor: "#ffffff",
                glyph: glyphText, 
                scale: 1.2
            });
            
            const marker = new AdvancedMarkerElement({
                position: { lat: species.lat, lng: species.lng },
                map: map,
                title: species.name,
                content: pinBackground.element 
            });

            // 標記點擊事件：跳出詳細資訊視窗
            marker.addListener("click", () => {
                if (currentInfoWindow) currentInfoWindow.close();

                const typeText = species.type === 'animal' ? '動物' : '植物';
                const contentString = `
                    <div class="custom-iw-wrapper">
                        <div class="view-popup">
                            <h3>${species.name}</h3>
                            <span class="badge">${typeText}</span>
                            <p><strong>描述：</strong>${species.description}</p>
                            <div class="meta">回報日期：${species.date}<br>座標：${species.lat.toFixed(4)}, ${species.lng.toFixed(4)}</div>
                        </div>
                    </div>
                `;

                currentInfoWindow = new google.maps.InfoWindow({
                    content: contentString
                });
                currentInfoWindow.open({
                    anchor: marker,
                    map: map
                });
            });
        }

        // 4. 處理地圖點擊（於點擊位置跳出輸入表單）
        function handleMapClick(latLng) {
            if (currentInfoWindow) currentInfoWindow.close();

            const lat = latLng.lat();
            const lng = latLng.lng();

            const formContent = `
                <div class="custom-iw-wrapper">
                    <div class="report-form">
                        <h3>新增生態觀測</h3>
                        <div class="form-group">
                            <label>名稱 (如：台灣獼猴)</label>
                            <input type="text" id="species-name" placeholder="請輸入動植物名稱" required>
                        </div>
                        <div class="form-group">
                            <label>分類</label>
                            <select id="species-type">
                                <option value="animal">動物</option>
                                <option value="plant">植物</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>生態描述</label>
                            <input type="text" id="species-desc" placeholder="數量、行為或周邊環境...">
                        </div>
                        <button class="submit-btn" onclick="submitReport(${lat}, ${lng})">送出回報</button>
                    </div>
                </div>
            `;

            currentInfoWindow = new google.maps.InfoWindow({
                content: formContent,
                position: latLng
            });
            currentInfoWindow.open(map);
        }

        // 5. 處理表單送出與本地資料儲存
        function submitReport(lat, lng) {
            const name = document.getElementById("species-name").value.trim();
            const type = document.getElementById("species-type").value;
            const description = document.getElementById("species-desc").value.trim() || "無詳細描述";
            const today = new Date().toISOString().split('T');

            if (!name) {
                alert("請填寫動植物名稱！");
                return;
            }

            const newSpecies = {
                id: Date.now(),
                name: name,
                type: type,
                description: description,
                lat: lat,
                lng: lng,
                date: today
            };
